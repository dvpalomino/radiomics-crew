# Hierarchical process: the chair holds the original goal while the specialists drift into
# their own concerns, delegates, and sends thin positions back. Tasks below carry no `agent`
# field on purpose — under Process.hierarchical the manager assigns them.

gather_evidence:
  description: >
    Methodological question under discussion: "{question}"
    Clinical context: {context}
    Options on the table: {options}

    Before anyone states a position, establish what the literature actually says. Search PubMed for
    evidence bearing directly on the options, fetch abstracts, and pull the Methods of the most
    relevant open-access papers.
    Separate three things explicitly: what is empirically supported, what is convention repeated
    without evidence, and what is genuinely unresolved. The middle category is usually the largest
    and is the one the panel most needs flagged.
  expected_output: >
    An evidence brief: for each option, the supporting studies with PMIDs, what they measured and in
    which population, plus an explicit list of what nobody appears to have tested.

collect_positions:
  description: >
    Each panel member states a position on "{question}", from their own role, in their own interest.
    Every position must carry: the position itself, the rationale, the evidence (a PMID from the brief,
    or the literal words "expert opinion, no citation" — never a fabricated citation), and a confidence
    level.
    Each member must also state their concerns about the other roles' likely positions. The
    radiologist should push back on unimplementable elegance; the biostatistician on underpowered
    claims; the engineer on non-determinism; the regulatory advisor on undocumentable choices; the
    methodologist on standards being waved away.
    Do not converge yet. A panel that agrees at this stage has not been probed hard enough — send
    back any position that rests on assertion where evidence was available.
  expected_output: >
    A JSON object {"statements": [...]} with one entry per role, each carrying role, position,
    rationale, evidence (list), concerns_about_other_roles (list) and confidence.
  context: [gather_evidence]

adjudicate:
  description: >
    You are writing the DECISION, not a transcript. The five panel statements already exist from the
    previous step — do NOT reproduce them. Your job is the synthesis that follows from them.

    Write the JSON fields in THIS ORDER, and put your effort into the later ones — they are the point
    of the whole exercise and the ones that get lost if you run long:
      1. question, context, options_considered — one line each, brief.
      2. panel_statements — leave this as an EMPTY LIST []. The statements are carried in separately;
         do not rewrite them here. This is the single most important instruction: rewriting the five
         statements is what truncates the record before the decision is written.
      3. points_of_disagreement — the real ones, not vocabulary differences. If the biostatistician
         says the cohort cannot support the claim, it goes here even if the rest are enthusiastic.
         Manufactured consensus is the specific failure this panel exists to prevent. At most 8, one
         sentence each.
      4. consensus — 2-4 sentences: where the panel actually landed, and on what it did not.
      5. recommended_protocol — an ordered, executable protocol, not principles. "FBS, bin width 25 HU,
         on images resampled to 1x1x1 mm with a B-spline interpolator" is a protocol; "choose an
         appropriate discretisation" is not. At most 8 steps.
      6. reproducibility_requirements (max 6), residual_risks, revisit_if — one sentence each.

    Output the complete JSON object and nothing after it. A record that reaches panel_statements and
    stops — with the disagreements, consensus and protocol empty — is the one failure this task exists
    to avoid. Those four fields matter more than everything above them.
  expected_output: >
    A complete MethodsDecisionRecord whose points_of_disagreement, consensus, recommended_protocol,
    reproducibility_requirements, residual_risks and revisit_if are ALL populated. panel_statements
    may be an empty list — the statements are supplied separately.
  context: [gather_evidence, collect_positions]
  output_file: outputs/methods_decision_record.json
